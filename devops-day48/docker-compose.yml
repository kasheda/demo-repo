services:
  day48-backend:
    build:
      context: ./backend
      args:
        DAY48_SERVICE_NAME: "${DAY48_SERVICE_NAME}"
        DAY48_DEPLOY_TARGET: "${DAY48_DEPLOY_TARGET}"
        DAY48_APP_VERSION: "${DAY48_APP_VERSION}"
        DAY48_BUILD_NUMBER: "${DAY48_BUILD_NUMBER}"
        DAY48_GIT_COMMIT: "${DAY48_GIT_COMMIT}"
        DAY48_IMAGE_TAG: "${DAY48_IMAGE_TAG}"
        DAY48_RELEASE_CREATED_AT: "${DAY48_RELEASE_CREATED_AT}"
        DAY48_ROLLBACK_IMAGE_TAG: "${DAY48_ROLLBACK_IMAGE_TAG}"
        DAY48_ROLLBACK_MODE: "${DAY48_ROLLBACK_MODE}"
        DAY48_STABILITY_CHECK_WINDOW_SECONDS: "${DAY48_STABILITY_CHECK_WINDOW_SECONDS}"
        DAY48_STABILITY_CHECK_INTERVAL_SECONDS: "${DAY48_STABILITY_CHECK_INTERVAL_SECONDS}"
        DAY48_FORCE_STABILITY_FAILURE: "${DAY48_FORCE_STABILITY_FAILURE}"
        DAY48_PROMOTION_TARGET: "${DAY48_PROMOTION_TARGET}"
        DAY48_PROMOTION_APPROVED: "${DAY48_PROMOTION_APPROVED}"
        DAY48_CHANGE_RECORD_ID: "${DAY48_CHANGE_RECORD_ID}"
        DAY48_RELEASE_NOTES_REQUIRED: "${DAY48_RELEASE_NOTES_REQUIRED}"
        DAY48_RELEASE_NOTES_STATUS: "${DAY48_RELEASE_NOTES_STATUS}"
        DAY48_APPROVAL_REQUIRED: "${DAY48_APPROVAL_REQUIRED}"
        DAY48_APPROVAL_STATUS: "${DAY48_APPROVAL_STATUS}"
        DAY48_APPROVED_BY: "${DAY48_APPROVED_BY}"
        DAY48_APPROVAL_REASON: "${DAY48_APPROVAL_REASON}"
        DAY48_DEPLOYMENT_WINDOW_STATUS: "${DAY48_DEPLOYMENT_WINDOW_STATUS}"
        DAY48_CHANGE_FREEZE_ACTIVE: "${DAY48_CHANGE_FREEZE_ACTIVE}"
        DAY48_FREEZE_REASON: "${DAY48_FREEZE_REASON}"
    image: day48-backend:${DAY48_IMAGE_TAG}
    container_name: day48_backend
    environment:
      PORT: "${DAY48_BACKEND_PORT}"
      APP_ENV: "${DAY48_APP_ENV}"
      DEPLOY_TARGET: "${DAY48_DEPLOY_TARGET}"
      APP_VERSION: "${DAY48_APP_VERSION}"
      SERVICE_NAME: "${DAY48_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY48_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY48_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY48_METRICS_ENABLED}"
      BUILD_NUMBER: "${DAY48_BUILD_NUMBER}"
      GIT_COMMIT: "${DAY48_GIT_COMMIT}"
      IMAGE_TAG: "${DAY48_IMAGE_TAG}"
      RELEASE_CREATED_AT: "${DAY48_RELEASE_CREATED_AT}"
      ROLLBACK_IMAGE_TAG: "${DAY48_ROLLBACK_IMAGE_TAG}"
      ROLLBACK_MODE: "${DAY48_ROLLBACK_MODE}"
      STABILITY_CHECK_WINDOW_SECONDS: "${DAY48_STABILITY_CHECK_WINDOW_SECONDS}"
      STABILITY_CHECK_INTERVAL_SECONDS: "${DAY48_STABILITY_CHECK_INTERVAL_SECONDS}"
      FORCE_STABILITY_FAILURE: "${DAY48_FORCE_STABILITY_FAILURE}"
      PROMOTION_TARGET: "${DAY48_PROMOTION_TARGET}"
      PROMOTION_APPROVED: "${DAY48_PROMOTION_APPROVED}"
      CHANGE_RECORD_ID: "${DAY48_CHANGE_RECORD_ID}"
      RELEASE_NOTES_REQUIRED: "${DAY48_RELEASE_NOTES_REQUIRED}"
      RELEASE_NOTES_STATUS: "${DAY48_RELEASE_NOTES_STATUS}"
      APPROVAL_REQUIRED: "${DAY48_APPROVAL_REQUIRED}"
      APPROVAL_STATUS: "${DAY48_APPROVAL_STATUS}"
      APPROVED_BY: "${DAY48_APPROVED_BY}"
      APPROVAL_REASON: "${DAY48_APPROVAL_REASON}"
      DEPLOYMENT_WINDOW_STATUS: "${DAY48_DEPLOYMENT_WINDOW_STATUS}"
      CHANGE_FREEZE_ACTIVE: "${DAY48_CHANGE_FREEZE_ACTIVE}"
      FREEZE_REASON: "${DAY48_FREEZE_REASON}"
    ports:
      - "${DAY48_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day48-frontend:
    build:
      context: ./frontend
    image: day48-frontend:${DAY48_IMAGE_TAG}
    container_name: day48_frontend
    ports:
      - "${DAY48_FRONTEND_PORT}:80"
    depends_on:
      day48-backend:
        condition: service_healthy
    restart: unless-stopped
