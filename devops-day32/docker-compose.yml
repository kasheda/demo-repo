services:
  day32-backend:
    build:
      context: ./backend
    image: day32-backend
    container_name: day32_backend
    environment:
      PORT: "${DAY32_BACKEND_PORT}"
      APP_ENV: "${DAY32_APP_ENV}"
      APP_VERSION: "${DAY32_APP_VERSION}"
      SERVICE_NAME: "${DAY32_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY32_FEATURE_FLAG}"
    ports:
      - "${DAY32_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/broken-health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day32-frontend:
    build:
      context: ./frontend
    image: day32-frontend
    container_name: day32_frontend
    ports:
      - "${DAY32_FRONTEND_PORT}:80"
    depends_on:
      day32-backend:
        condition: service_healthy
    restart: unless-stopped
