services:
  backend:
    build:
      context: ./backend
    image: day22-backend
    container_name: day22_backend
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
    image: day22-frontend
    container_name: day22_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
