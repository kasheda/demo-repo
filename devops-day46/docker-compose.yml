services:
  day46-backend:
    build:
      context: ./backend
      args:
        DAY46_SERVICE_NAME: "${DAY46_SERVICE_NAME}"
        DAY46_DEPLOY_TARGET: "${DAY46_DEPLOY_TARGET}"
        DAY46_APP_VERSION: "${DAY46_APP_VERSION}"
        DAY46_BUILD_NUMBER: "${DAY46_BUILD_NUMBER}"
        DAY46_GIT_COMMIT: "${DAY46_GIT_COMMIT}"
        DAY46_IMAGE_TAG: "${DAY46_IMAGE_TAG}"
        DAY46_RELEASE_CREATED_AT: "${DAY46_RELEASE_CREATED_AT}"
        DAY46_ROLLBACK_IMAGE_TAG: "${DAY46_ROLLBACK_IMAGE_TAG}"
        DAY46_ROLLBACK_MODE: "${DAY46_ROLLBACK_MODE}"
        DAY46_STABILITY_CHECK_WINDOW_SECONDS: "${DAY46_STABILITY_CHECK_WINDOW_SECONDS}"
        DAY46_STABILITY_CHECK_INTERVAL_SECONDS: "${DAY46_STABILITY_CHECK_INTERVAL_SECONDS}"
        DAY46_FORCE_STABILITY_FAILURE: "${DAY46_FORCE_STABILITY_FAILURE}"
        DAY46_PROMOTION_TARGET: "${DAY46_PROMOTION_TARGET}"
        DAY46_PROMOTION_APPROVED: "${DAY46_PROMOTION_APPROVED}"
        DAY46_CHANGE_RECORD_ID: "${DAY46_CHANGE_RECORD_ID}"
        DAY46_RELEASE_NOTES_REQUIRED: "${DAY46_RELEASE_NOTES_REQUIRED}"
        DAY46_RELEASE_NOTES_STATUS: "${DAY46_RELEASE_NOTES_STATUS}"
    image: day46-backend:${DAY46_IMAGE_TAG}
    container_name: day46_backend
    environment:
      PORT: "${DAY46_BACKEND_PORT}"
      APP_ENV: "${DAY46_APP_ENV}"
      DEPLOY_TARGET: "${DAY46_DEPLOY_TARGET}"
      APP_VERSION: "${DAY46_APP_VERSION}"
      SERVICE_NAME: "${DAY46_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY46_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY46_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY46_METRICS_ENABLED}"
      BUILD_NUMBER: "${DAY46_BUILD_NUMBER}"
      GIT_COMMIT: "${DAY46_GIT_COMMIT}"
      IMAGE_TAG: "${DAY46_IMAGE_TAG}"
      RELEASE_CREATED_AT: "${DAY46_RELEASE_CREATED_AT}"
      ROLLBACK_IMAGE_TAG: "${DAY46_ROLLBACK_IMAGE_TAG}"
      ROLLBACK_MODE: "${DAY46_ROLLBACK_MODE}"
      STABILITY_CHECK_WINDOW_SECONDS: "${DAY46_STABILITY_CHECK_WINDOW_SECONDS}"
      STABILITY_CHECK_INTERVAL_SECONDS: "${DAY46_STABILITY_CHECK_INTERVAL_SECONDS}"
      FORCE_STABILITY_FAILURE: "${DAY46_FORCE_STABILITY_FAILURE}"
      PROMOTION_TARGET: "${DAY46_PROMOTION_TARGET}"
      PROMOTION_APPROVED: "${DAY46_PROMOTION_APPROVED}"
      CHANGE_RECORD_ID: "${DAY46_CHANGE_RECORD_ID}"
      RELEASE_NOTES_REQUIRED: "${DAY46_RELEASE_NOTES_REQUIRED}"
      RELEASE_NOTES_STATUS: "${DAY46_RELEASE_NOTES_STATUS}"
    ports:
      - "${DAY46_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day46-frontend:
    build:
      context: ./frontend
    image: day46-frontend:${DAY46_IMAGE_TAG}
    container_name: day46_frontend
    ports:
      - "${DAY46_FRONTEND_PORT}:80"
    depends_on:
      day46-backend:
        condition: service_healthy
    restart: unless-stopped
