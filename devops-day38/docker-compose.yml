services:
  day38-backend:
    build:
      context: ./backend
    image: day38-backend:${DAY38_IMAGE_TAG}
    container_name: day38_backend
    environment:
      PORT: "${DAY38_BACKEND_PORT}"
      APP_ENV: "${DAY38_APP_ENV}"
      DEPLOY_TARGET: "${DAY38_DEPLOY_TARGET}"
      APP_VERSION: "${DAY38_APP_VERSION}"
      SERVICE_NAME: "${DAY38_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY38_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY38_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY38_METRICS_ENABLED}"
      BUILD_NUMBER: "${DAY38_BUILD_NUMBER}"
      GIT_COMMIT: "${DAY38_GIT_COMMIT}"
      IMAGE_TAG: "${DAY38_IMAGE_TAG}"
    ports:
      - "${DAY38_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day38-frontend:
    build:
      context: ./frontend
    image: day38-frontend:${DAY38_IMAGE_TAG}
    container_name: day38_frontend
    ports:
      - "${DAY38_FRONTEND_PORT}:80"
    depends_on:
      day38-backend:
        condition: service_healthy
    restart: unless-stopped
