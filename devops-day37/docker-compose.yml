services:
  day37-backend:
    build:
      context: ./backend
    image: day37-backend
    container_name: day37_backend
    environment:
      PORT: "${DAY37_BACKEND_PORT}"
      APP_ENV: "${DAY37_APP_ENV}"
      DEPLOY_TARGET: "${DAY37_DEPLOY_TARGET}"
      APP_VERSION: "${DAY37_APP_VERSION}"
      SERVICE_NAME: "${DAY37_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY37_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY37_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY37_METRICS_ENABLED}"
    ports:
      - "${DAY37_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day37-frontend:
    build:
      context: ./frontend
    image: day37-frontend
    container_name: day37_frontend
    ports:
      - "${DAY37_FRONTEND_PORT}:80"
    depends_on:
      day37-backend:
        condition: service_healthy
    restart: unless-stopped
