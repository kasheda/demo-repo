<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DevOps Day 28</title>
</head>
<body>
  <h1>DevOps Day 28</h1>
  <p>Frontend is running through Nginx.</p>

  <h2>Backend API Message</h2>
  <pre id="api-response">Loading...</pre>

  <script>
    fetch('/api/message')
      .then(response => response.json())
      .then(data => {
        document.getElementById('api-response').textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(error => {
        document.getElementById('api-response').textContent =
          'Failed to reach backend API: ' + error;
      });
  </script>
</body>
</html>
