services:
  day47-backend:
    build:
      context: ./backend
      args:
        DAY47_SERVICE_NAME: "${DAY47_SERVICE_NAME}"
        DAY47_DEPLOY_TARGET: "${DAY47_DEPLOY_TARGET}"
        DAY47_APP_VERSION: "${DAY47_APP_VERSION}"
        DAY47_BUILD_NUMBER: "${DAY47_BUILD_NUMBER}"
        DAY47_GIT_COMMIT: "${DAY47_GIT_COMMIT}"
        DAY47_IMAGE_TAG: "${DAY47_IMAGE_TAG}"
        DAY47_RELEASE_CREATED_AT: "${DAY47_RELEASE_CREATED_AT}"
        DAY47_ROLLBACK_IMAGE_TAG: "${DAY47_ROLLBACK_IMAGE_TAG}"
        DAY47_ROLLBACK_MODE: "${DAY47_ROLLBACK_MODE}"
        DAY47_STABILITY_CHECK_WINDOW_SECONDS: "${DAY47_STABILITY_CHECK_WINDOW_SECONDS}"
        DAY47_STABILITY_CHECK_INTERVAL_SECONDS: "${DAY47_STABILITY_CHECK_INTERVAL_SECONDS}"
        DAY47_FORCE_STABILITY_FAILURE: "${DAY47_FORCE_STABILITY_FAILURE}"
        DAY47_PROMOTION_TARGET: "${DAY47_PROMOTION_TARGET}"
        DAY47_PROMOTION_APPROVED: "${DAY47_PROMOTION_APPROVED}"
        DAY47_CHANGE_RECORD_ID: "${DAY47_CHANGE_RECORD_ID}"
        DAY47_RELEASE_NOTES_REQUIRED: "${DAY47_RELEASE_NOTES_REQUIRED}"
        DAY47_RELEASE_NOTES_STATUS: "${DAY47_RELEASE_NOTES_STATUS}"
        DAY47_APPROVAL_REQUIRED: "${DAY47_APPROVAL_REQUIRED}"
        DAY47_APPROVAL_STATUS: "${DAY47_APPROVAL_STATUS}"
        DAY47_APPROVED_BY: "${DAY47_APPROVED_BY}"
        DAY47_APPROVAL_REASON: "${DAY47_APPROVAL_REASON}"
    image: day47-backend:${DAY47_IMAGE_TAG}
    container_name: day47_backend
    environment:
      PORT: "${DAY47_BACKEND_PORT}"
      APP_ENV: "${DAY47_APP_ENV}"
      DEPLOY_TARGET: "${DAY47_DEPLOY_TARGET}"
      APP_VERSION: "${DAY47_APP_VERSION}"
      SERVICE_NAME: "${DAY47_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY47_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY47_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY47_METRICS_ENABLED}"
      BUILD_NUMBER: "${DAY47_BUILD_NUMBER}"
      GIT_COMMIT: "${DAY47_GIT_COMMIT}"
      IMAGE_TAG: "${DAY47_IMAGE_TAG}"
      RELEASE_CREATED_AT: "${DAY47_RELEASE_CREATED_AT}"
      ROLLBACK_IMAGE_TAG: "${DAY47_ROLLBACK_IMAGE_TAG}"
      ROLLBACK_MODE: "${DAY47_ROLLBACK_MODE}"
      STABILITY_CHECK_WINDOW_SECONDS: "${DAY47_STABILITY_CHECK_WINDOW_SECONDS}"
      STABILITY_CHECK_INTERVAL_SECONDS: "${DAY47_STABILITY_CHECK_INTERVAL_SECONDS}"
      FORCE_STABILITY_FAILURE: "${DAY47_FORCE_STABILITY_FAILURE}"
      PROMOTION_TARGET: "${DAY47_PROMOTION_TARGET}"
      PROMOTION_APPROVED: "${DAY47_PROMOTION_APPROVED}"
      CHANGE_RECORD_ID: "${DAY47_CHANGE_RECORD_ID}"
      RELEASE_NOTES_REQUIRED: "${DAY47_RELEASE_NOTES_REQUIRED}"
      RELEASE_NOTES_STATUS: "${DAY47_RELEASE_NOTES_STATUS}"
      APPROVAL_REQUIRED: "${DAY47_APPROVAL_REQUIRED}"
      APPROVAL_STATUS: "${DAY47_APPROVAL_STATUS}"
      APPROVED_BY: "${DAY47_APPROVED_BY}"
      APPROVAL_REASON: "${DAY47_APPROVAL_REASON}"
    ports:
      - "${DAY47_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day47-frontend:
    build:
      context: ./frontend
    image: day47-frontend:${DAY47_IMAGE_TAG}
    container_name: day47_frontend
    ports:
      - "${DAY47_FRONTEND_PORT}:80"
    depends_on:
      day47-backend:
        condition: service_healthy
    restart: unless-stopped
