services:
  day35-backend:
    build:
      context: ./backend
    image: day35-backend
    container_name: day35_backend
    environment:
      PORT: "${DAY35_BACKEND_PORT}"
      APP_ENV: "${DAY35_APP_ENV}"
      APP_VERSION: "${DAY35_APP_VERSION}"
      SERVICE_NAME: "${DAY35_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY35_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY35_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY35_METRICS_ENABLED}"
    ports:
      - "${DAY35_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day35-frontend:
    build:
      context: ./frontend
    image: day35-frontend
    container_name: day35_frontend
    ports:
      - "${DAY35_FRONTEND_PORT}:80"
    depends_on:
      day35-backend:
        condition: service_healthy
    restart: unless-stopped
