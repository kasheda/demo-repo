<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DevOps Day 33</title>
</head>
<body>
  <h1>DevOps Day 33</h1>
  <p>Frontend starts after the Day 33 backend becomes healthy.</p>
  <p>Day 33 adds .env.example and configuration drift validation.</p>

  <h2>Backend API Message</h2>
  <pre id="api-message">Loading message...</pre>

  <h2>Backend Runtime Config</h2>
  <pre id="api-config">Loading config...</pre>

  <script>
    fetch('/api/message')
      .then(response => response.json())
      .then(data => {
        document.getElementById('api-message').textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(error => {
        document.getElementById('api-message').textContent =
          'Failed to reach Day 33 backend API: ' + error;
      });

    fetch('/api/config')
      .then(response => response.json())
      .then(data => {
        document.getElementById('api-config').textContent =
          JSON.stringify(data, null, 2);
      })
      .catch(error => {
        document.getElementById('api-config').textContent =
          'Failed to reach Day 33 backend config API: ' + error;
      });
  </script>
</body>
</html>
