services:
  day31-backend:
    build:
      context: ./backend
    image: day31-backend
    container_name: day31_backend
    environment:
      PORT: "${DAY31_BACKEND_PORT}"
      APP_ENV: "${DAY31_APP_ENV}"
      APP_VERSION: "${DAY31_APP_VERSION}"
      SERVICE_NAME: "${DAY31_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY31_FEATURE_FLAG}"
    ports:
      - "${DAY31_BACKEND_PORT}:3000"

  day31-frontend:
    build:
      context: ./frontend
    image: day31-frontend
    container_name: day31_frontend
    ports:
      - "${DAY31_FRONTEND_PORT}:80"
    depends_on:
      - day31-backend
