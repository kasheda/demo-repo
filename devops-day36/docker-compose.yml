services:
  day36-backend:
    build:
      context: ./backend
    image: day36-backend
    container_name: day36_backend
    environment:
      PORT: "${DAY36_BACKEND_PORT}"
      APP_ENV: "${DAY36_APP_ENV}"
      DEPLOY_TARGET: "${DAY36_DEPLOY_TARGET}"
      APP_VERSION: "${DAY36_APP_VERSION}"
      SERVICE_NAME: "${DAY36_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY36_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY36_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY36_METRICS_ENABLED}"
    ports:
      - "${DAY36_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day36-frontend:
    build:
      context: ./frontend
    image: day36-frontend
    container_name: day36_frontend
    ports:
      - "${DAY36_FRONTEND_PORT}:80"
    depends_on:
      day36-backend:
        condition: service_healthy
    restart: unless-stopped
