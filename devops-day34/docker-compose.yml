services:
  day34-backend:
    build:
      context: ./backend
    image: day34-backend
    container_name: day34_backend
    environment:
      PORT: "${DAY34_BACKEND_PORT}"
      APP_ENV: "${DAY34_APP_ENV}"
      APP_VERSION: "${DAY34_APP_VERSION}"
      SERVICE_NAME: "${DAY34_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY34_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY34_LOG_LEVEL}"
    ports:
      - "${DAY34_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day34-frontend:
    build:
      context: ./frontend
    image: day34-frontend
    container_name: day34_frontend
    ports:
      - "${DAY34_FRONTEND_PORT}:80"
    depends_on:
      day34-backend:
        condition: service_healthy
    restart: unless-stopped
