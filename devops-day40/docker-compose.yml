services:
  day40-backend:
    build:
      context: ./backend
      args:
        DAY40_SERVICE_NAME: "${DAY40_SERVICE_NAME}"
        DAY40_DEPLOY_TARGET: "${DAY40_DEPLOY_TARGET}"
        DAY40_APP_VERSION: "${DAY40_APP_VERSION}"
        DAY40_BUILD_NUMBER: "${DAY40_BUILD_NUMBER}"
        DAY40_GIT_COMMIT: "${DAY40_GIT_COMMIT}"
        DAY40_IMAGE_TAG: "${DAY40_IMAGE_TAG}"
        DAY40_RELEASE_CREATED_AT: "${DAY40_RELEASE_CREATED_AT}"
    image: day40-backend:${DAY40_IMAGE_TAG}
    container_name: day40_backend
    environment:
      PORT: "${DAY40_BACKEND_PORT}"
      APP_ENV: "${DAY40_APP_ENV}"
      DEPLOY_TARGET: "${DAY40_DEPLOY_TARGET}"
      APP_VERSION: "${DAY40_APP_VERSION}"
      SERVICE_NAME: "${DAY40_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY40_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY40_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY40_METRICS_ENABLED}"
      BUILD_NUMBER: "${DAY40_BUILD_NUMBER}"
      GIT_COMMIT: "${DAY40_GIT_COMMIT}"
      IMAGE_TAG: "${DAY40_IMAGE_TAG}"
      RELEASE_CREATED_AT: "${DAY40_RELEASE_CREATED_AT}"
    ports:
      - "${DAY40_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day40-frontend:
    build:
      context: ./frontend
    image: day40-frontend:${DAY40_IMAGE_TAG}
    container_name: day40_frontend
    ports:
      - "${DAY40_FRONTEND_PORT}:80"
    depends_on:
      day40-backend:
        condition: service_healthy
    restart: unless-stopped
