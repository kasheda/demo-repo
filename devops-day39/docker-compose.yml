services:
  day39-backend:
    build:
      context: ./backend
      args:
        DAY39_SERVICE_NAME: "${DAY39_SERVICE_NAME}"
        DAY39_DEPLOY_TARGET: "${DAY39_DEPLOY_TARGET}"
        DAY39_APP_VERSION: "${DAY39_APP_VERSION}"
        DAY39_BUILD_NUMBER: "${DAY39_BUILD_NUMBER}"
        DAY39_GIT_COMMIT: "${DAY39_GIT_COMMIT}"
        DAY39_IMAGE_TAG: "${DAY39_IMAGE_TAG}"
        DAY39_RELEASE_CREATED_AT: "${DAY39_RELEASE_CREATED_AT}"
    image: day39-backend:${DAY39_IMAGE_TAG}
    container_name: day39_backend
    environment:
      PORT: "${DAY39_BACKEND_PORT}"
      APP_ENV: "${DAY39_APP_ENV}"
      DEPLOY_TARGET: "${DAY39_DEPLOY_TARGET}"
      APP_VERSION: "${DAY39_APP_VERSION}"
      SERVICE_NAME: "${DAY39_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY39_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY39_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY39_METRICS_ENABLED}"
      BUILD_NUMBER: "${DAY39_BUILD_NUMBER}"
      GIT_COMMIT: "${DAY39_GIT_COMMIT}"
      IMAGE_TAG: "${DAY39_IMAGE_TAG}"
      RELEASE_CREATED_AT: "${DAY39_RELEASE_CREATED_AT}"
    ports:
      - "${DAY39_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day39-frontend:
    build:
      context: ./frontend
    image: day39-frontend:${DAY39_IMAGE_TAG}
    container_name: day39_frontend
    ports:
      - "${DAY39_FRONTEND_PORT}:80"
    depends_on:
      day39-backend:
        condition: service_healthy
    restart: unless-stopped
