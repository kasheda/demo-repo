services:
  day43-backend:
    build:
      context: ./backend
      args:
        DAY43_SERVICE_NAME: "${DAY43_SERVICE_NAME}"
        DAY43_DEPLOY_TARGET: "${DAY43_DEPLOY_TARGET}"
        DAY43_APP_VERSION: "${DAY43_APP_VERSION}"
        DAY43_BUILD_NUMBER: "${DAY43_BUILD_NUMBER}"
        DAY43_GIT_COMMIT: "${DAY43_GIT_COMMIT}"
        DAY43_IMAGE_TAG: "${DAY43_IMAGE_TAG}"
        DAY43_RELEASE_CREATED_AT: "${DAY43_RELEASE_CREATED_AT}"
        DAY43_ROLLBACK_IMAGE_TAG: "${DAY43_ROLLBACK_IMAGE_TAG}"
        DAY43_ROLLBACK_MODE: "${DAY43_ROLLBACK_MODE}"
        DAY43_STABILITY_CHECK_WINDOW_SECONDS: "${DAY43_STABILITY_CHECK_WINDOW_SECONDS}"
        DAY43_STABILITY_CHECK_INTERVAL_SECONDS: "${DAY43_STABILITY_CHECK_INTERVAL_SECONDS}"
    image: day43-backend:${DAY43_IMAGE_TAG}
    container_name: day43_backend
    environment:
      PORT: "${DAY43_BACKEND_PORT}"
      APP_ENV: "${DAY43_APP_ENV}"
      DEPLOY_TARGET: "${DAY43_DEPLOY_TARGET}"
      APP_VERSION: "${DAY43_APP_VERSION}"
      SERVICE_NAME: "${DAY43_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY43_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY43_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY43_METRICS_ENABLED}"
      BUILD_NUMBER: "${DAY43_BUILD_NUMBER}"
      GIT_COMMIT: "${DAY43_GIT_COMMIT}"
      IMAGE_TAG: "${DAY43_IMAGE_TAG}"
      RELEASE_CREATED_AT: "${DAY43_RELEASE_CREATED_AT}"
      ROLLBACK_IMAGE_TAG: "${DAY43_ROLLBACK_IMAGE_TAG}"
      ROLLBACK_MODE: "${DAY43_ROLLBACK_MODE}"
      STABILITY_CHECK_WINDOW_SECONDS: "${DAY43_STABILITY_CHECK_WINDOW_SECONDS}"
      STABILITY_CHECK_INTERVAL_SECONDS: "${DAY43_STABILITY_CHECK_INTERVAL_SECONDS}"
    ports:
      - "${DAY43_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day43-frontend:
    build:
      context: ./frontend
    image: day43-frontend:${DAY43_IMAGE_TAG}
    container_name: day43_frontend
    ports:
      - "${DAY43_FRONTEND_PORT}:80"
    depends_on:
      day43-backend:
        condition: service_healthy
    restart: unless-stopped
