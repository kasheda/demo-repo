services:
  day42-backend:
    build:
      context: ./backend
      args:
        DAY42_SERVICE_NAME: "${DAY42_SERVICE_NAME}"
        DAY42_DEPLOY_TARGET: "${DAY42_DEPLOY_TARGET}"
        DAY42_APP_VERSION: "${DAY42_APP_VERSION}"
        DAY42_BUILD_NUMBER: "${DAY42_BUILD_NUMBER}"
        DAY42_GIT_COMMIT: "${DAY42_GIT_COMMIT}"
        DAY42_IMAGE_TAG: "${DAY42_IMAGE_TAG}"
        DAY42_RELEASE_CREATED_AT: "${DAY42_RELEASE_CREATED_AT}"
        DAY42_ROLLBACK_IMAGE_TAG: "${DAY42_ROLLBACK_IMAGE_TAG}"
        DAY42_ROLLBACK_MODE: "${DAY42_ROLLBACK_MODE}"
    image: day42-backend:${DAY42_IMAGE_TAG}
    container_name: day42_backend
    environment:
      PORT: "${DAY42_BACKEND_PORT}"
      APP_ENV: "${DAY42_APP_ENV}"
      DEPLOY_TARGET: "${DAY42_DEPLOY_TARGET}"
      APP_VERSION: "${DAY42_APP_VERSION}"
      SERVICE_NAME: "${DAY42_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY42_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY42_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY42_METRICS_ENABLED}"
      BUILD_NUMBER: "${DAY42_BUILD_NUMBER}"
      GIT_COMMIT: "${DAY42_GIT_COMMIT}"
      IMAGE_TAG: "${DAY42_IMAGE_TAG}"
      RELEASE_CREATED_AT: "${DAY42_RELEASE_CREATED_AT}"
      ROLLBACK_IMAGE_TAG: "${DAY42_ROLLBACK_IMAGE_TAG}"
      ROLLBACK_MODE: "${DAY42_ROLLBACK_MODE}"
    ports:
      - "${DAY42_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day42-frontend:
    build:
      context: ./frontend
    image: day42-frontend:${DAY42_IMAGE_TAG}
    container_name: day42_frontend
    ports:
      - "${DAY42_FRONTEND_PORT}:80"
    depends_on:
      day42-backend:
        condition: service_healthy
    restart: unless-stopped
