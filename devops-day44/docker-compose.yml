services:
  day44-backend:
    build:
      context: ./backend
      args:
        DAY44_SERVICE_NAME: "${DAY44_SERVICE_NAME}"
        DAY44_DEPLOY_TARGET: "${DAY44_DEPLOY_TARGET}"
        DAY44_APP_VERSION: "${DAY44_APP_VERSION}"
        DAY44_BUILD_NUMBER: "${DAY44_BUILD_NUMBER}"
        DAY44_GIT_COMMIT: "${DAY44_GIT_COMMIT}"
        DAY44_IMAGE_TAG: "${DAY44_IMAGE_TAG}"
        DAY44_RELEASE_CREATED_AT: "${DAY44_RELEASE_CREATED_AT}"
        DAY44_ROLLBACK_IMAGE_TAG: "${DAY44_ROLLBACK_IMAGE_TAG}"
        DAY44_ROLLBACK_MODE: "${DAY44_ROLLBACK_MODE}"
        DAY44_STABILITY_CHECK_WINDOW_SECONDS: "${DAY44_STABILITY_CHECK_WINDOW_SECONDS}"
        DAY44_STABILITY_CHECK_INTERVAL_SECONDS: "${DAY44_STABILITY_CHECK_INTERVAL_SECONDS}"
        DAY44_FORCE_STABILITY_FAILURE: "${DAY44_FORCE_STABILITY_FAILURE}"
    image: day44-backend:${DAY44_IMAGE_TAG}
    container_name: day44_backend
    environment:
      PORT: "${DAY44_BACKEND_PORT}"
      APP_ENV: "${DAY44_APP_ENV}"
      DEPLOY_TARGET: "${DAY44_DEPLOY_TARGET}"
      APP_VERSION: "${DAY44_APP_VERSION}"
      SERVICE_NAME: "${DAY44_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY44_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY44_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY44_METRICS_ENABLED}"
      BUILD_NUMBER: "${DAY44_BUILD_NUMBER}"
      GIT_COMMIT: "${DAY44_GIT_COMMIT}"
      IMAGE_TAG: "${DAY44_IMAGE_TAG}"
      RELEASE_CREATED_AT: "${DAY44_RELEASE_CREATED_AT}"
      ROLLBACK_IMAGE_TAG: "${DAY44_ROLLBACK_IMAGE_TAG}"
      ROLLBACK_MODE: "${DAY44_ROLLBACK_MODE}"
      STABILITY_CHECK_WINDOW_SECONDS: "${DAY44_STABILITY_CHECK_WINDOW_SECONDS}"
      STABILITY_CHECK_INTERVAL_SECONDS: "${DAY44_STABILITY_CHECK_INTERVAL_SECONDS}"
      FORCE_STABILITY_FAILURE: "${DAY44_FORCE_STABILITY_FAILURE}"
    ports:
      - "${DAY44_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day44-frontend:
    build:
      context: ./frontend
    image: day44-frontend:${DAY44_IMAGE_TAG}
    container_name: day44_frontend
    ports:
      - "${DAY44_FRONTEND_PORT}:80"
    depends_on:
      day44-backend:
        condition: service_healthy
    restart: unless-stopped
