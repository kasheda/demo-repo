services:
  day49-backend:
    build:
      context: ./backend
      args:
        DAY49_SERVICE_NAME: "${DAY49_SERVICE_NAME}"
        DAY49_DEPLOY_TARGET: "${DAY49_DEPLOY_TARGET}"
        DAY49_APP_VERSION: "${DAY49_APP_VERSION}"
        DAY49_BUILD_NUMBER: "${DAY49_BUILD_NUMBER}"
        DAY49_GIT_COMMIT: "${DAY49_GIT_COMMIT}"
        DAY49_IMAGE_TAG: "${DAY49_IMAGE_TAG}"
        DAY49_RELEASE_CREATED_AT: "${DAY49_RELEASE_CREATED_AT}"
        DAY49_ROLLBACK_IMAGE_TAG: "${DAY49_ROLLBACK_IMAGE_TAG}"
        DAY49_ROLLBACK_MODE: "${DAY49_ROLLBACK_MODE}"
        DAY49_STABILITY_CHECK_WINDOW_SECONDS: "${DAY49_STABILITY_CHECK_WINDOW_SECONDS}"
        DAY49_STABILITY_CHECK_INTERVAL_SECONDS: "${DAY49_STABILITY_CHECK_INTERVAL_SECONDS}"
        DAY49_FORCE_STABILITY_FAILURE: "${DAY49_FORCE_STABILITY_FAILURE}"
        DAY49_FORCE_PRODLIKE_STABILITY_FAILURE: "${DAY49_FORCE_PRODLIKE_STABILITY_FAILURE}"
        DAY49_PRODLIKE_ROLLBACK_ON_FAILURE: "${DAY49_PRODLIKE_ROLLBACK_ON_FAILURE}"
        DAY49_PROMOTION_TARGET: "${DAY49_PROMOTION_TARGET}"
        DAY49_PROMOTION_APPROVED: "${DAY49_PROMOTION_APPROVED}"
        DAY49_CHANGE_RECORD_ID: "${DAY49_CHANGE_RECORD_ID}"
        DAY49_RELEASE_NOTES_REQUIRED: "${DAY49_RELEASE_NOTES_REQUIRED}"
        DAY49_RELEASE_NOTES_STATUS: "${DAY49_RELEASE_NOTES_STATUS}"
        DAY49_APPROVAL_REQUIRED: "${DAY49_APPROVAL_REQUIRED}"
        DAY49_APPROVAL_STATUS: "${DAY49_APPROVAL_STATUS}"
        DAY49_APPROVED_BY: "${DAY49_APPROVED_BY}"
        DAY49_APPROVAL_REASON: "${DAY49_APPROVAL_REASON}"
        DAY49_DEPLOYMENT_WINDOW_STATUS: "${DAY49_DEPLOYMENT_WINDOW_STATUS}"
        DAY49_CHANGE_FREEZE_ACTIVE: "${DAY49_CHANGE_FREEZE_ACTIVE}"
        DAY49_FREEZE_REASON: "${DAY49_FREEZE_REASON}"
    image: day49-backend:${DAY49_IMAGE_TAG}
    container_name: day49_backend
    environment:
      PORT: "${DAY49_BACKEND_PORT}"
      APP_ENV: "${DAY49_APP_ENV}"
      DEPLOY_TARGET: "${DAY49_DEPLOY_TARGET}"
      APP_VERSION: "${DAY49_APP_VERSION}"
      SERVICE_NAME: "${DAY49_SERVICE_NAME}"
      FEATURE_FLAG: "${DAY49_FEATURE_FLAG}"
      LOG_LEVEL: "${DAY49_LOG_LEVEL}"
      METRICS_ENABLED: "${DAY49_METRICS_ENABLED}"
      BUILD_NUMBER: "${DAY49_BUILD_NUMBER}"
      GIT_COMMIT: "${DAY49_GIT_COMMIT}"
      IMAGE_TAG: "${DAY49_IMAGE_TAG}"
      RELEASE_CREATED_AT: "${DAY49_RELEASE_CREATED_AT}"
      ROLLBACK_IMAGE_TAG: "${DAY49_ROLLBACK_IMAGE_TAG}"
      ROLLBACK_MODE: "${DAY49_ROLLBACK_MODE}"
      STABILITY_CHECK_WINDOW_SECONDS: "${DAY49_STABILITY_CHECK_WINDOW_SECONDS}"
      STABILITY_CHECK_INTERVAL_SECONDS: "${DAY49_STABILITY_CHECK_INTERVAL_SECONDS}"
      FORCE_STABILITY_FAILURE: "${DAY49_FORCE_STABILITY_FAILURE}"
      FORCE_PRODLIKE_STABILITY_FAILURE: "${DAY49_FORCE_PRODLIKE_STABILITY_FAILURE}"
      PRODLIKE_ROLLBACK_ON_FAILURE: "${DAY49_PRODLIKE_ROLLBACK_ON_FAILURE}"
      PROMOTION_TARGET: "${DAY49_PROMOTION_TARGET}"
      PROMOTION_APPROVED: "${DAY49_PROMOTION_APPROVED}"
      CHANGE_RECORD_ID: "${DAY49_CHANGE_RECORD_ID}"
      RELEASE_NOTES_REQUIRED: "${DAY49_RELEASE_NOTES_REQUIRED}"
      RELEASE_NOTES_STATUS: "${DAY49_RELEASE_NOTES_STATUS}"
      APPROVAL_REQUIRED: "${DAY49_APPROVAL_REQUIRED}"
      APPROVAL_STATUS: "${DAY49_APPROVAL_STATUS}"
      APPROVED_BY: "${DAY49_APPROVED_BY}"
      APPROVAL_REASON: "${DAY49_APPROVAL_REASON}"
      DEPLOYMENT_WINDOW_STATUS: "${DAY49_DEPLOYMENT_WINDOW_STATUS}"
      CHANGE_FREEZE_ACTIVE: "${DAY49_CHANGE_FREEZE_ACTIVE}"
      FREEZE_REASON: "${DAY49_FREEZE_REASON}"
    ports:
      - "${DAY49_BACKEND_PORT}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

  day49-frontend:
    build:
      context: ./frontend
    image: day49-frontend:${DAY49_IMAGE_TAG}
    container_name: day49_frontend
    ports:
      - "${DAY49_FRONTEND_PORT}:80"
    depends_on:
      day49-backend:
        condition: service_healthy
    restart: unless-stopped
